<main class="login-page">
  <section class="brand-panel">
    <div class="brand-mark">ISER</div>
    <h1>Trabajos de grado ISER</h1>
    <p>Establece una nueva contraseña.</p>
  </section>

  <section class="login-card">
    <h2>Nueva contraseña</h2>

    <div *ngIf="!tokenChecked()">
      <p class="subtitle">Verificando enlace...</p>
      <div class="loading-spinner"></div>
    </div>

    <div *ngIf="tokenChecked() && !validToken()">
      <p class="error">{{ error() }}</p>
      <div class="links">
        <a routerLink="/forgot-password">Solicitar nuevo enlace</a>
      </div>
    </div>

    <div *ngIf="tokenChecked() && validToken()">
      <p class="subtitle">Ingresa tu nueva contraseña.</p>

      <form (ngSubmit)="onSubmit()" novalidate>
        <label>
          Nueva contraseña
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="Al menos 6 caracteres"
            autocomplete="new-password"
            required
          />
        </label>

        <label>
          Confirmar contraseña
          <input
            type="password"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            placeholder="Repite tu contraseña"
            autocomplete="new-password"
            required
          />
        </label>

        <p class="error" *ngIf="error()">{{ error() }}</p>
        <p class="success" *ngIf="success()">{{ success() }}</p>

        <button type="submit" [disabled]="loading()">
          {{ loading() ? 'Actualizando...' : 'Cambiar contraseña' }}
        </button>
      </form>

      <div class="links">
        <a routerLink="/login">Volver al inicio de sesión</a>
      </div>
    </div>
  </section>
</main>
