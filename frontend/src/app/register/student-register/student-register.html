<main class="student-page">
  <header class="top-navbar">
    <div class="navbar-brand">
      <img class="brand-logo" src="/assets/logo_iser.png" alt="ISER" />
      <div>
        <h1>Registro de Estudiantes</h1>
      </div>
    </div>

    <div class="navbar-center">
      <span class="nav-chip">Coordinador</span>
    </div>

    <div class="navbar-right">
      <button class="nav-item" type="button" (click)="goToHome('/home-coordinador')">Volver</button>
    </div>
  </header>

  <div class="page-shell">
    <p class="error" *ngIf="error()">{{ error() }}</p>
    <p class="success" *ngIf="success()">{{ success() }}</p>

    <section class="panel-shell form-shell">
      <h2 class="section-title">Datos Estudiante</h2>

      <div class="form-card">
        <div class="crud-panel-header compact">
          <button class="btn-outline" type="button" (click)="startCreate()" *ngIf="editingStudentId">Nuevo registro</button>
        </div>

        <form class="crud-form three-columns" (ngSubmit)="onSubmit()" #studentForm="ngForm" novalidate>
          <div class="form-group pill-field">
            <label>Nombre</label>
            <input type="text" name="nombre" [(ngModel)]="nombre" placeholder="nombre" required />
          </div>

          <div class="form-group pill-field">
            <label>Correo</label>
            <input type="email" name="email" [(ngModel)]="email" placeholder="correo" autocomplete="email" required />
          </div>

          <div class="form-group pill-field">
            <label>Contraseña</label>
            <div class="password-field">
              <input type="text" name="password" [(ngModel)]="password" placeholder="temporal" readonly />
              <button type="button" class="btn-generate" (click)="generateTemporaryPassword()">Generar</button>
            </div>
          </div>

          <div class="form-group pill-field">
            <label>Rol</label>
            <input type="text" [value]="'estudiante'" readonly />
          </div>

          <div class="form-group pill-field">
            <label>Programa</label>
            <select name="carreraId" [(ngModel)]="carreraId" required>
              <option value="">Selecciona un programa</option>
              <option *ngFor="let carrera of carreras()" [value]="carrera.id">{{ carrera.nombre }}</option>
            </select>
          </div>

          <div class="form-group action-field">
            <label>&nbsp;</label>
            <div class="crud-actions compact">
              <button class="btn-primary btn-save" type="submit" [disabled]="loading()">
                {{ editingStudentId ? 'ACTUALIZAR' : 'GUARDAR' }}
              </button>
              <button class="btn-outline" type="button" (click)="resetForm()" *ngIf="editingStudentId">Limpiar</button>
            </div>
          </div>
        </form>
      </div>
    </section>

    <section class="panel-shell table-shell">
      <h2 class="section-title">Usuarios Registrados</h2>

      <div class="table-card">
        <div class="table-wrap" *ngIf="students().length > 0">
          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Contraseña</th>
                <th>Rol</th>
                <th>Programa</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let student of students()">
                <td>{{ student.nombre }}</td>
                <td>{{ student.email }}</td>
                <td><span class="password-mask">********</span></td>
                <td><span class="badge">{{ student.rol }}</span></td>
                <td>{{ student.carrera_nombre || '-' }}</td>
                <td>
                  <div class="table-actions">
                    <button class="btn-primary btn-edit" type="button" (click)="startEdit(student)" [disabled]="loading()">
                      Editar
                    </button>
                    <button class="btn-danger" type="button" (click)="deleteStudent(student)" [disabled]="loading()">
                      Eliminar
                    </button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <p *ngIf="!loading() && students().length === 0" class="empty">No hay estudiantes registrados aún.</p>
      </div>
    </section>
  </div>
</main>
