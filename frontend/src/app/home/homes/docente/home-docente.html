<main class="docentes-container">
  <!-- Header verde superior -->
  <header class="navbar-top">
    <div class="navbar-brand">
      <img class="logo-iser" src="/assets/logo_iser.png" alt="ISER" />
    </div>
    
    <div class="search-box">
      <input type="text" placeholder="Search" [ngModel]="searchTerm()" (ngModelChange)="searchTerm.set($event)" />
      <svg class="search-icon" viewBox="0 0 20 20">
        <path fill="currentColor" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
      </svg>
    </div>

    <button class="user-icon" (click)="logout()" title="Cerrar sesión">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="8" r="4"/><path d="M12 14c-4 0-6 2-6 4v2h12v-2c0-2-2-4-6-4z"/>
      </svg>
    </button>
  </header>

  <!-- Contenedor principal con tres áreas -->
  <div class="main-content">
    <!-- Área izquierda: Opciones de archivos -->
    <section class="left-panel">
      <div class="archivos-section">
        <button class="file-button" *ngFor="let file of fileOptions" 
                [class.active]="file.id === selectedFile()"
                (click)="selectFile(file.id)">
          {{ file.nombre }}
        </button>
      </div>
    </section>

    <!-- Área central: Lista de docentes/estudiantes -->
    <section class="center-panel">
      <div class="docentes-list">
        <div class="docente-item" *ngFor="let docente of filteredDocentes()"
             [class.active]="docente.id === selectedDocente()?.id"
             (click)="selectDocente(docente)">
          {{ docente.nombre }}
        </div>
      </div>
    </section>

    <!-- Área derecha: Visor de documento -->
    <section class="right-panel">
      <div class="document-viewer">
        <div *ngIf="selectedDocente() as docente" class="document-content">
          <h3>{{ docente.nombre }}</h3>
          <p><strong>Email:</strong> {{ docente.email }}</p>
          <p><strong>Rol:</strong> {{ docente.rol_principal }}</p>
          <div class="document-placeholder"></div>
        </div>
        <div *ngIf="!selectedDocente()" class="empty-document">
          Selecciona un docente para ver más información
        </div>
      </div>
    </section>
  </div>

  <!-- Sección inferior: Estadísticas -->
  <section class="bottom-panel">
    <div class="stats-container">
      <div class="stats-header">% trabajos</div>
      <div class="stats-buttons">
        <button class="stat-button pending">pendientes</button>
        <button class="stat-button approved">aprobados</button>
        <button class="stat-button rejected">reprobados</button>
      </div>
    </div>
  </section>
</main>
