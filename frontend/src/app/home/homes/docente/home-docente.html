<main class="home-page docente-layout">
  <header class="top-navbar">
    <div class="navbar-brand">
      <img class="brand-logo" src="/assets/logo_iser.png" alt="ISER" />
      <h1>Docente</h1>
    </div>

    <div class="search-area">
      <form class="search-form" role="search" (submit)="$event.preventDefault()">
        <div class="search-input-wrap">
          <input class="search-input" type="search" placeholder="Buscar proyectos, estudiantes..." aria-label="Buscar" />
          <button class="search-btn" type="submit" title="Buscar" (click)="$event.preventDefault()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M21 21l-4.35-4.35" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              <circle cx="11" cy="11" r="6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </form>
    </div>

    <div class="navbar-right">
      <div class="user-profile">
        <div class="avatar">{{ userInitials }}</div>
        <span>{{ displayName }}</span>
      </div>
      <button class="btn-logout" (click)="logout()" title="Cerrar sesion">Salir</button>
    </div>
  </header>

  <section class="dashboard-grid">
    <aside class="panel files-panel">
      <div class="file-list">
        <label>Carpeta</label>
        <select [(ngModel)]="selectedCarpeta">
          <option *ngFor="let f of carpetaOptions" [value]="f">{{ f }}</option>
        </select>
        <button class="btn" (click)="loadEntregasByCarpeta(selectedCarpeta())">Ver archivos</button>
        <ul class="entregas-list">
          <li *ngFor="let e of entregas()">
            <span>{{ e.nombre_original || e.archivo }}</span>
            <small>{{ e.fecha_entrega | date:'short' }}</small>
            <button class="btn-link" (click)="verDocumento(e)">Ver</button>
          </li>
        </ul>
      </div>
    </aside>

    <div class="panel students-column">
      <div class="student-list">
        <button class="student-button" *ngFor="let p of assignedProjects()"> 
          {{ p.estudiante_nombre || p.titulo || 'nombre' }}
        </button>
        <p *ngIf="!assignedProjects().length" class="empty-students">nombre</p>
      </div>
    </div>

    <div class="panel viewer-large">
      <div class="viewer-empty"></div>
    </div>

    <div class="panel progress-box">
      <div class="progress-title">% tabajos</div>
      <div class="progress-bar-outer">
        <div class="progress-sections">
          <button class="pill pending">pendientes</button>
          <button class="pill approved">aprobados</button>
          <button class="pill failed">reprobados</button>
        </div>
      </div>
    </div>

    <div class="panel right-info">
      <div class="info-row">info de alumno (ser el asesor o el jurado)</div>
      <div class="info-row">info de alumno (ser el asesor o el jurado)</div>
      <div class="info-row">info de alumno (ser el asesor o el jurado)</div>
    </div>
  </section>
</main>
