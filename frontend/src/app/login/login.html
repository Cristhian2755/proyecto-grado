<main class="login-page">
  <section class="brand-panel">
    <div class="brand-mark">ISER</div>
    <h1>Trabajos de grado ISER</h1>
    <p>Accede a la plataforma académica de una forma limpia, rápida y simple.</p>
  </section>

  <section class="login-card">
    <h2>Iniciar sesión</h2>
    <p class="subtitle">Ingresa tus credenciales para continuar.</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
      <label>
        Correo electrónico
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Correo"
          autocomplete="email"
          required
        />
      </label>

      <label>
        Contraseña
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Contraseña"
          autocomplete="current-password"
          required
        />
      </label>

      @if (error()) {
      <p class="error">{{ error() }}</p>
      }
      @if (success()) {
      <p class="success">{{ success() }}</p>
      }

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Ingresando...' : 'Entrar' }}
      </button>
    </form>

    <div class="links">
      <a routerLink="/register">¿No tienes cuenta? Regístrate</a>
      <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
    </div>
  </section>
</main>
